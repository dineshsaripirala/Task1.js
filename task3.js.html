<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JavaScript Practice</title>
</head>
<body>
    <h1>JavaScript Operators Practice</h1>
    <p>Check the <strong>Browser Console (F12)</strong> to see the output.</p>
<script>
    //if else
let num = 15;
if (num > 10) {
    console.log('Number is big');
}

// 2. Voting eligibility
let age = 20;
if (age >= 18) {
    console.log('Eligible to vote');
} else {
    console.log('Not eligible to vote');
}

// 3. Temperature check
let temperature = 32;
if (temperature > 30) {
    console.log('Hot');
} else {
    console.log('Cool');
}

// 4. Check if number is positive or negative
let x = -5;
if (x >= 0) {
    console.log('Positive');
} else {
    console.log('Negative');
}

// 5. Check if even or odd
let n = 7;
if (n % 2 === 0) {
    console.log('Even');
} else {
    console.log('Odd');
}

//else if
// 1. Grading system
let marks = 85;
if (marks >= 90) {
    console.log('Grade A');
} else if (marks >= 70) {
    console.log('Grade B');
} else if (marks >= 50) {
    console.log('Grade C');
} else {
    console.log('Fail');
}

// 2. Time of day message
let hour = 14; 
if (hour >= 5 && hour < 12) {
    console.log('Morning');
} else if (hour >= 12 && hour < 17) {
    console.log('Afternoon');
} else if (hour >= 17 && hour < 21) {
    console.log('Evening');
} else {
    console.log('Night');
}

// 3. Positive, Negative, or Zero
let val = 0;
if (val > 0) {
    console.log('Positive');
} else if (val < 0) {
    console.log('Negative');
} else {
    console.log('Zero');
}

// 4. Score feedback
let score = 75;
if (score >= 100) {
    console.log('Winner');
} else if (score >= 50) {
    console.log('Good');
} else {
    console.log('Try again');
}

// 5. Largest among 3 numbers
let a = 10, b = 25, c = 15;
if (a >= b && a >= c) {
    console.log('Largest is ' + a);
} else if (b >= a && b >= c) {
    console.log('Largest is ' + b);
} else {
    console.log('Largest is ' + c);
}

//Switch statement
// 1. Day name
let day = 1;
switch (day) {
    case 1: console.log("Monday"); break;
    case 2: console.log("Tuesday"); break;
    // ... and so on
    default: console.log("Invalid day");
}

// 2. Traffic Light
let trafficLight = "Red";
switch (trafficLight) {
    case "Red": console.log("Stop"); break;
    case "Yellow": console.log("Ready"); break;
    case "Green": console.log("Go"); break;
}

// 3. Season by Month
let month = "March";
switch (month) {
    case "December": case "January": case "February": console.log("Winter"); break;
    case "March": case "April": case "May": console.log("Spring"); break;
    case "June": case "July": case "August": console.log("Summer"); break;
    case "September": case "October": case "November": console.log("Autumn"); break;
}

// 4. Role Message
let role = "Admin";
switch (role) {
    case "Admin": console.log("Full Access"); break;
    case "User": console.log("Limited Access"); break;
    case "Guest": console.log("Read Only"); break;
}

// 5. Grade Performance
let grade = "A";
switch (grade) {
    case "A": console.log("Excellent"); break;
    case "B": console.log("Good job"); break;
    case "C": console.log("Keep trying"); break;
    default: console.log("Fail");
}

//For loop
// 1. Print numbers 1 to 10
for (let i = 1; i <= 10; i++) {
    console.log(i);
}

// 2. Print numbers 10 to 1
for (let i = 10; i >= 1; i--) {
    console.log(i);
}

// 3. Even numbers 1 to 20
for (let i = 2; i <= 20; i += 2) {
    console.log(i);
}

// 4. Odd numbers 1 to 20
for (let i = 1; i <= 20; i += 2) {
    console.log(i);
}

// 5. Multiplication table of 5
for (let i = 1; i <= 10; i++) {
    console.log(`5 * ${i} = ${5 * i}`);
}

//While loop
// 1. Print numbers 1 to 5
let o = 1;
while (o <= 5) {
    console.log(o);
    o++;
}

// 2. Print numbers 5 to 1
let y = 5;
while (y>= 1) {
    console.log(y);
    y--;
}

// 3. Even numbers 1 to 10
let z = 2;
while (z <= 10) {
    console.log(z);
    z += 2;
}

// DO while
// 1. Print numbers 1 to 5
let i = 1;
do {
    console.log(i);
    i++;
} while (i <= 5);

// 2. Print numbers 5 to 1
let j = 5;
do {
    console.log(j);
    j--;
} while (j >= 1);

// 3. Print multiples of 3 up to 30
let k = 3;
do {
    console.log(k);
    k += 3;
} while (k <= 30);

// 4. Print numbers divisible by 4 from 1 to 20
let l = 1;
do {
    if (l % 4 === 0) console.log(l);
    l++;
} while (l <= 20);

// 5. Print numbers until value reaches 10
let m = 1;
do {
    console.log(m);
    m++;
} while (m <= 10);

//for of
// 1. Create string 'javascript' and print each character
let str = 'javascript';
for (let char of str) {
    console.log(char);
}

// 2. Create array and print each fruit
let fruits = ['apple', 'banana', 'orange'];
for (let fruit of fruits) {
    console.log(fruit);
}

// 3. Count number of characters in string
let text = "hello";
let count = 0;
for (let char of text) {
    count++;
}
console.log("Character count:", count);

// 4. Print only vowels from a string
let sentence = "hello world";
let vowels = "aeiou";
for (let char of sentence) {
    if (vowels.includes(char)) console.log(char);
}

// 5. Print sum of numbers from an array
let numbers = [10, 20, 30];
let total = 0;
for (let num of numbers) {
    total += num;
}
console.log("Sum:", total);

//for in
// 1. Create object student and print all values
const student = { name: "John", age: 21, department: "CS" };
for (let key in student) {
    console.log(student[key]);
}

// 2. Print all keys of an object
for (let key in student) {
    console.log(key);
}

// 3. Print key and value together
for (let key in student) {
    console.log(`${key}: ${student[key]}`);
}

//Function
// 1. Create function add(a, b) and return addition
function add(a, b) {
    return a + b;
}
console.log("Addition:", add(5, 10));

// 2. Create function square(num) and return square
function square(num) {
    return num * num;
}
console.log("Square:", square(4));

</script>
</body>
</html>
